<!--
  基本情報技術者試験 ループ問題集 (PWA)
  進捗は localStorage に保存（claude.ai では window.storage を使用）
-->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>基本情報技術者試験 ループ問題集</title>
<meta name="theme-color" content="#0E8A8F">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="FEドリル">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
  :root{
    --bg:#E9ECF0;
    --card:#FFFFFF;
    --ink:#14202E;
    --muted:#5E6E7D;
    --line:#D8DEE5;
    --accent:#0E8A8F;
    --accent-deep:#0A6468;
    --accent-soft:#E0F1F1;
    --correct:#1F9254;
    --correct-soft:#E4F4EA;
    --wrong:#CC3B36;
    --wrong-soft:#FBE7E6;
    --gold:#C9912F;
    --jp:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic","YuGothic","Noto Sans JP",Meiryo,sans-serif;
    --mono:ui-monospace,"SF Mono","DM Mono",Menlo,Consolas,"Courier New",monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:var(--jp);
    background:
      radial-gradient(circle at 1px 1px, rgba(14,138,143,.10) 1px, transparent 0) 0 0/22px 22px,
      var(--bg);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    line-height:1.7;
    min-height:100dvh;
  }
  .wrap{max-width:680px;margin:0 auto;padding:20px 18px 60px}

  /* ---- header ---- */
  header.app{display:flex;align-items:center;gap:12px;padding:6px 2px 16px}
  .mark{
    width:38px;height:38px;flex:0 0 38px;border-radius:11px;
    background:var(--ink);display:grid;place-items:center;
  }
  .mark svg{width:24px;height:24px}
  .app h1{font-size:16px;margin:0;letter-spacing:.02em;font-weight:700}
  .app .sub{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}

  .panel{
    background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:22px;box-shadow:0 1px 0 rgba(20,32,46,.02),0 14px 34px -26px rgba(20,32,46,.4);
  }

  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent-deep);margin:0 0 6px}
  h2.t{font-size:21px;margin:0 0 4px;font-weight:800;letter-spacing:.01em}
  p.lead{color:var(--muted);font-size:13.5px;margin:0 0 20px}

  /* ---- choosers ---- */
  .field{margin:0 0 18px}
  .field > label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin:0 0 8px;letter-spacing:.03em}
  .seg{display:flex;flex-wrap:wrap;gap:8px}
  .seg button{
    font-family:var(--jp);font-size:13px;font-weight:600;color:var(--ink);
    background:#fff;border:1.5px solid var(--line);border-radius:11px;
    padding:9px 13px;cursor:pointer;transition:.14s;
  }
  .seg button[aria-pressed="true"]{background:var(--ink);color:#fff;border-color:var(--ink)}
  .seg button:hover:not([aria-pressed="true"]){border-color:var(--accent)}

  .btn-primary{
    width:100%;font-family:var(--jp);font-size:15px;font-weight:800;letter-spacing:.04em;
    color:#fff;background:var(--accent);border:none;border-radius:13px;
    padding:15px;cursor:pointer;transition:.14s;margin-top:6px;
  }
  .btn-primary:hover{background:var(--accent-deep)}
  .btn-primary:active{transform:translateY(1px)}
  .btn-primary:disabled{background:#9fb4b6;cursor:not-allowed}

  /* ---- overall stats on start ---- */
  .stats{display:flex;gap:10px;margin:20px 0 0}
  .stat{flex:1;background:var(--bg);border-radius:12px;padding:12px 10px;text-align:center}
  .stat b{display:block;font-family:var(--mono);font-size:22px;font-weight:600;line-height:1.1}
  .stat span{font-size:11px;color:var(--muted)}
  .reset{margin-top:14px;text-align:center}
  .reset button{background:none;border:none;color:var(--muted);font-size:12px;text-decoration:underline;cursor:pointer;font-family:var(--jp)}

  /* ---- quiz bar ---- */
  .bar{display:flex;align-items:center;gap:14px;margin:0 0 16px}
  .ring{position:relative;width:58px;height:58px;flex:0 0 58px}
  .ring svg{transform:rotate(-90deg)}
  .ring .lap{position:absolute;inset:0;display:grid;place-items:center;text-align:center}
  .ring .lap b{font-family:var(--mono);font-size:16px;font-weight:600;line-height:1}
  .ring .lap span{font-size:8.5px;color:var(--muted);letter-spacing:.1em}
  .barmeta{flex:1;min-width:0}
  .barmeta .row1{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .tag{font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.06em;padding:3px 8px;border-radius:999px;background:var(--accent-soft);color:var(--accent-deep)}
  .tag.sub{background:var(--bg);color:var(--muted)}
  .streak{font-family:var(--mono);font-size:12px;color:var(--gold);font-weight:600}
  .remain{font-size:11.5px;color:var(--muted);margin-top:5px;font-family:var(--mono);letter-spacing:.04em}
  .quitbtn{background:none;border:1px solid var(--line);border-radius:9px;color:var(--muted);font-size:12px;padding:7px 10px;cursor:pointer;font-family:var(--jp);flex:0 0 auto}
  .quitbtn:hover{border-color:var(--wrong);color:var(--wrong)}

  /* ---- question ---- */
  .qnum{font-family:var(--mono);font-size:11px;color:var(--accent-deep);letter-spacing:.1em;margin:0 0 8px}
  .qtext{font-size:16.5px;font-weight:700;line-height:1.75;margin:0 0 18px}
  .qtext code{font-family:var(--mono);background:var(--bg);padding:1px 6px;border-radius:5px;font-size:.92em}

  .choices{display:flex;flex-direction:column;gap:10px}
  .choice{
    display:flex;align-items:flex-start;gap:12px;width:100%;text-align:left;
    font-family:var(--jp);font-size:14.5px;color:var(--ink);line-height:1.6;
    background:#fff;border:1.5px solid var(--line);border-radius:13px;
    padding:13px 14px;cursor:pointer;transition:.12s;
  }
  .choice:hover:not(:disabled){border-color:var(--accent);background:var(--accent-soft)}
  .choice:disabled{cursor:default}
  .choice .key{
    flex:0 0 26px;height:26px;border-radius:8px;background:var(--bg);
    display:grid;place-items:center;font-family:var(--mono);font-weight:600;font-size:13px;color:var(--muted);
    transition:.12s;
  }
  .choice.correct{border-color:var(--correct);background:var(--correct-soft)}
  .choice.correct .key{background:var(--correct);color:#fff}
  .choice.wrong{border-color:var(--wrong);background:var(--wrong-soft)}
  .choice.wrong .key{background:var(--wrong);color:#fff}
  .choice.dim{opacity:.5}

  /* ---- feedback ---- */
  .fb{margin-top:16px;border-radius:13px;padding:14px 16px;display:none;animation:rise .22s ease}
  .fb.show{display:block}
  .fb.ok{background:var(--correct-soft);border:1px solid #b8e0c6}
  .fb.ng{background:var(--wrong-soft);border:1px solid #f0c4c2}
  .fb .verdict{font-weight:800;font-size:14px;display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .fb.ok .verdict{color:var(--correct)}
  .fb.ng .verdict{color:var(--wrong)}
  .fb .loopnote{font-family:var(--mono);font-size:11px;color:var(--wrong);font-weight:600;margin-bottom:6px}
  .fb p{margin:0;font-size:13.5px;color:var(--ink);line-height:1.7}
  .fb .ans{font-weight:700}
  @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  .nextrow{margin-top:16px;display:none}
  .nextrow.show{display:block}
  .nextrow .hint{text-align:center;font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:8px;letter-spacing:.05em}

  /* ---- done ---- */
  .done{text-align:center;padding:8px 4px}
  .done .big{font-family:var(--mono);font-size:46px;font-weight:600;line-height:1;margin:6px 0 2px}
  .done .pct{color:var(--accent-deep)}
  .row2{display:flex;gap:10px;margin-top:18px}
  .row2 .btn-primary{margin-top:0}
  .btn-ghost{
    flex:1;font-family:var(--jp);font-size:14px;font-weight:700;color:var(--ink);
    background:#fff;border:1.5px solid var(--line);border-radius:13px;padding:15px;cursor:pointer;
  }
  .btn-ghost:hover{border-color:var(--accent)}

  footer{text-align:center;margin-top:26px;font-size:11px;color:var(--muted)}
  .hidden{display:none!important}

  @media (max-width:420px){
    .qtext{font-size:15.5px}
    .stat b{font-size:19px}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>

<div class="wrap">
  <header class="app">
    <div class="mark" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12a9 9 0 1 1-3.5-7.1"/><path d="M21 4v5h-5"/>
      </svg>
    </div>
    <div>
      <h1>基本情報技術者試験 ループ問題集</h1>
      <div class="sub">FE Loop Drill</div>
    </div>
  </header>

  <!-- ===== START ===== -->
  <section id="start" class="panel">
    <p class="eyebrow">Drill Setup</p>
    <h2 class="t">出題範囲を選んで開始</h2>
    <p class="lead">正解でも不正解でも、判定と解説を確認したらランダムで次の問題へ。終わりなく周回できるので、すきま時間に繰り返し解いて定着させましょう。</p>

    <div class="field">
      <label>分野</label>
      <div class="seg" id="seg-cat" role="group" aria-label="分野">
        <button data-v="all" aria-pressed="true">全分野</button>
        <button data-v="tech">テクノロジ系</button>
        <button data-v="mgmt">マネジメント系</button>
        <button data-v="strat">ストラテジ系</button>
      </div>
    </div>

    <div class="field">
      <label>出題数</label>
      <div class="seg" id="seg-num" role="group" aria-label="出題数">
        <button data-v="10">10問</button>
        <button data-v="20" aria-pressed="true">20問</button>
        <button data-v="all">全問</button>
      </div>
    </div>

    <div class="field">
      <label>出題順</label>
      <div class="seg" id="seg-order" role="group" aria-label="出題順">
        <button data-v="random" aria-pressed="true">ランダム</button>
        <button data-v="seq">順番どおり</button>
        <button data-v="weak">苦手優先</button>
      </div>
    </div>

    <button class="btn-primary" id="go">この設定で開始</button>

    <div class="stats" id="overall">
      <div class="stat"><b id="ov-acc">–</b><span>通算正答率</span></div>
      <div class="stat"><b id="ov-mastered">–</b><span>マスター済み</span></div>
      <div class="stat"><b id="ov-answered">–</b><span>通算回答数</span></div>
    </div>
    <div class="reset"><button id="resetstats">学習記録をリセット</button></div>
  </section>

  <!-- ===== QUIZ ===== -->
  <section id="quiz" class="hidden">
    <div class="bar">
      <div class="ring" aria-hidden="true">
        <svg width="58" height="58" viewBox="0 0 58 58">
          <circle cx="29" cy="29" r="25" fill="none" stroke="var(--line)" stroke-width="6"/>
          <circle id="ring-fg" cx="29" cy="29" r="25" fill="none" stroke="var(--accent)" stroke-width="6"
                  stroke-linecap="round" stroke-dasharray="157" stroke-dashoffset="157"
                  style="transition:stroke-dashoffset .4s ease"/>
        </svg>
        <div class="lap"><b id="lap-n">–</b><span id="ring-label">正答率</span></div>
      </div>
      <div class="barmeta">
        <div class="row1">
          <span class="tag" id="q-cat">—</span>
          <span class="tag sub" id="q-sub">—</span>
          <span class="streak" id="streak"></span>
        </div>
        <div class="remain" id="remain">残り — 問</div>
      </div>
      <button class="quitbtn" id="quit">終了</button>
    </div>

    <article class="panel">
      <p class="qnum" id="qnum">Q.</p>
      <p class="qtext" id="qtext"></p>
      <div class="choices" id="choices"></div>

      <div class="fb" id="fb">
        <div class="verdict" id="verdict"></div>
        <div class="loopnote" id="loopnote"></div>
        <p id="exp"></p>
      </div>

      <div class="nextrow" id="nextrow">
        <button class="btn-primary" id="next">次の問題へ</button>
        <div class="hint">Enter キーでも進めます</div>
      </div>
    </article>
  </section>

  <footer>正誤判定のあとランダムで周回する「ループ式」FE学習ドリル · 進捗は自動保存されます</footer>
</div>

<script>
/* ============================================================
   問題データ  cat: tech | mgmt | strat
   a: 正解インデックス(0始まり)  c: 選択肢 ア/イ/ウ/エ
   ============================================================ */
const QUESTIONS = [
  // ---- テクノロジ系：基礎理論 ----
  {cat:"tech",sub:"基数変換",q:"2進数 1011 を10進数で表したものはどれか。",c:["9","11","13","15"],a:1,exp:"各桁の重みは 8・4・2・1。1011 = 8+0+2+1 = 11 となる。"},
  {cat:"tech",sub:"基数変換",q:"16進数 AC を10進数で表したものはどれか。",c:["152","160","172","188"],a:2,exp:"A=10、C=12。10×16 + 12 = 160 + 12 = 172。"},
  {cat:"tech",sub:"基数変換",q:"10進数 25 を2進数で表したものはどれか。",c:["10011","11001","11010","10101"],a:1,exp:"25 = 16+8+1 = 11001（16,8,4,2,1 の重みで判断）。"},
  {cat:"tech",sub:"データ表現",q:"8ビットの符号なし2進数で表せる10進数の最大値はどれか。",c:["127","128","255","256"],a:2,exp:"8ビットでは 0〜2^8−1、すなわち 0〜255 を表現できる。"},
  {cat:"tech",sub:"補数表現",q:"8ビットの2の補数表現で −1 を表すビット列はどれか。",c:["10000001","11111110","11111111","00000001"],a:2,exp:"2の補数では −1 は全ビットが1。+1(00000001)のビット反転+1で 11111111 となる。"},
  {cat:"tech",sub:"論理演算",q:"排他的論理和(XOR)で 1 XOR 1 を計算した結果はどれか。",c:["0","1","2","不定"],a:0,exp:"XOR は入力が異なるとき1、同じとき0。1と1は同じなので結果は0。"},
  {cat:"tech",sub:"論理演算",q:"ビット列 10110 と 01100 の論理積(AND)はどれか。",c:["11110","00100","10100","01100"],a:1,exp:"AND は両方が1の桁だけ1。各桁を比較すると 00100 になる。"},
  {cat:"tech",sub:"シフト演算",q:"ある整数を2ビット左にシフトすると、値は元の何倍になるか(オーバーフローしないものとする)。",c:["2倍","4倍","8倍","1/4倍"],a:1,exp:"1ビット左シフトで2倍。2ビットなら 2×2 = 4倍になる。"},
  {cat:"tech",sub:"単位",q:"コンピュータで接頭語 K(キロ)が表す値として一般的なものはどれか。",c:["1000","1024","2048","1048576"],a:1,exp:"記憶容量などでは K=2^10=1024 を表すことが多い。"},

  // ---- テクノロジ系：アルゴリズムとデータ構造 ----
  {cat:"tech",sub:"データ構造",q:"後入れ先出し(LIFO)で動作するデータ構造はどれか。",c:["キュー","スタック","ヒープ","ハッシュ表"],a:1,exp:"スタックは最後に入れたものを最初に取り出す(LIFO)。関数呼出しの管理などに使う。"},
  {cat:"tech",sub:"データ構造",q:"先入れ先出し(FIFO)で動作するデータ構造はどれか。",c:["スタック","キュー","木","グラフ"],a:1,exp:"キュー(待ち行列)は最初に入れたものを最初に取り出す(FIFO)。"},
  {cat:"tech",sub:"計算量",q:"要素数 n のソート済み配列に対する2分探索の計算量(オーダ)はどれか。",c:["O(1)","O(log n)","O(n)","O(n²)"],a:1,exp:"2分探索は探索範囲を毎回半分にするため、計算量は O(log n)。"},
  {cat:"tech",sub:"計算量",q:"n 個のデータを先頭から順に調べる線形探索の、最悪時の計算量はどれか。",c:["O(1)","O(log n)","O(n)","O(n²)"],a:2,exp:"目的のデータが末尾や存在しない場合、n 回の比較が必要で O(n)。"},
  {cat:"tech",sub:"整列",q:"基準値を決めてデータを大小2グループに分割していく、分割統治法による整列アルゴリズムはどれか。",c:["バブルソート","選択ソート","クイックソート","挿入ソート"],a:2,exp:"クイックソートはピボット(基準値)で分割を繰り返す分割統治法。平均計算量は O(n log n)。"},

  // ---- テクノロジ系：コンピュータシステム ----
  {cat:"tech",sub:"プロセッサ",q:"クロック周波数 1GHz のCPUは、1秒間におよそ何回のクロックを刻むか。",c:["100万回","1億回","10億回","1兆回"],a:2,exp:"1GHz = 10^9Hz。すなわち1秒間に約10億回のクロックを刻む。"},
  {cat:"tech",sub:"記憶階層",q:"CPUと主記憶の速度差を埋めるために両者の間に置かれる、高速で容量の小さい記憶装置はどれか。",c:["仮想記憶","キャッシュメモリ","補助記憶","レジスタファイル"],a:1,exp:"キャッシュメモリは主記憶の一部を保持し、アクセスを高速化する高速・小容量のメモリ。"},
  {cat:"tech",sub:"信頼性",q:"複数のディスクに同じ内容を書き込み、片方が故障してもデータを保持できる信頼性重視のRAID方式はどれか。",c:["RAID0","RAID1","RAID5","JBOD"],a:1,exp:"RAID1(ミラーリング)は同一データを2台に書き込み冗長性を確保する。RAID0は分散して性能を上げるが冗長性はない。"},
  {cat:"tech",sub:"信頼性",q:"MTBFが480時間、MTTRが20時間のシステムの稼働率はいくつか。",c:["0.04","0.90","0.96","0.98"],a:2,exp:"稼働率 = MTBF /(MTBF+MTTR)= 480 /(480+20)= 480/500 = 0.96。"},
  {cat:"tech",sub:"システム構成",q:"2系統で常に同じ処理を行い結果を照合することで、高い信頼性を確保する構成はどれか。",c:["デュプレックスシステム","デュアルシステム","ホットスタンバイ","ロードシェアシステム"],a:1,exp:"デュアルシステムは2系統が同じ処理を行い結果を比較する。デュプレックスは主系/待機系の構成。"},
  {cat:"tech",sub:"メモリ管理",q:"主記憶より大きな容量があるかのように見せかけ、補助記憶を併用してプログラムを実行する技術はどれか。",c:["キャッシュ","仮想記憶","スワップアウト禁止","固定区画方式"],a:1,exp:"仮想記憶は補助記憶を利用し、主記憶より大きなアドレス空間を提供する技術。ページングなどで実現する。"},

  // ---- テクノロジ系：ソフトウェア・データベース ----
  {cat:"tech",sub:"OS",q:"ハードウェアとアプリケーションの仲介をし、メモリ管理やタスク管理を行う基本ソフトウェアはどれか。",c:["ミドルウェア","OS(基本ソフトウェア)","コンパイラ","デバイスドライバ"],a:1,exp:"OS(オペレーティングシステム)は資源管理やタスク管理を担う基本ソフトウェア。"},

  {cat:"strat",sub:"法務",q:"労働者派遣において、業務上の指揮命令を行うのは原則として誰か。",c:["派遣元事業主","派遣先","労働基準監督署","派遣労働者本人"],a:1,exp:"派遣では派遣先が指揮命令を行う。請負では発注者が請負業者の労働者へ直接指揮命令できない点が違い。"},
  {cat:"strat",sub:"標準化",q:"情報セキュリティマネジメントに関する国際規格はどれか。",c:["ISO 9000","ISO 14000","ISO/IEC 27000","ISO 26000"],a:2,exp:"ISO/IEC 27000シリーズは情報セキュリティの規格。9000は品質、14000は環境マネジメント。"},
];

const CAT_LABEL = {tech:"テクノロジ系", mgmt:"マネジメント系", strat:"ストラテジ系"};
const KEYS = ["ア","イ","ウ","エ"];

/* ============================================================
   永続化（window.storage 優先 / 無ければメモリ）
   stats[id] = {correct, wrong}
   ============================================================ */
const STORE_KEY = "fe:stats:v1";
let stats = {};
let memFallback = {};
const hasStore = typeof window !== "undefined" && window.storage && typeof window.storage.get === "function";
const hasLS = (function(){ try{ const k="__t"; localStorage.setItem(k,"1"); localStorage.removeItem(k); return true; }catch(e){ return false; } })();

async function loadStats(){
  try{
    if(hasStore){ const r = await window.storage.get(STORE_KEY); if(r && r.value) stats = JSON.parse(r.value); }
    else if(hasLS){ const v = localStorage.getItem(STORE_KEY); if(v) stats = JSON.parse(v); }
    else { stats = memFallback[STORE_KEY] ? JSON.parse(memFallback[STORE_KEY]) : {}; }
  }catch(e){ stats = {}; }
  if(!stats || typeof stats !== "object") stats = {};
}
async function saveStats(){
  const v = JSON.stringify(stats);
  try{
    if(hasStore){ await window.storage.set(STORE_KEY, v, false); }
    else if(hasLS){ localStorage.setItem(STORE_KEY, v); }
    else { memFallback[STORE_KEY] = v; }
  }catch(e){}
}

function recordResult(id, ok){
  if(!stats[id]) stats[id] = {correct:0, wrong:0};
  if(ok) stats[id].correct++; else stats[id].wrong++;
  saveStats();
}

/* ============================================================
   状態
   ============================================================ */
let cfg = {cat:"all", num:"20", order:"random"};
let queue = [];          // 互換用（未使用）
let sessionIds = [];     // 出題対象ID
let streak = 0;
let answeredCount = 0;    // 出題した回数
let sessionCorrect = 0;   // 正解した回数
let current = null;
let locked = false;

/* ============================================================
   要素
   ============================================================ */
const $ = id => document.getElementById(id);
const startEl=$("start"), quizEl=$("quiz");

/* ---- segmented controls ---- */
function wireSeg(elId, key){
  $(elId).addEventListener("click", e=>{
    const b = e.target.closest("button"); if(!b) return;
    [...$(elId).children].forEach(x=>x.setAttribute("aria-pressed", x===b ? "true":"false"));
    cfg[key] = b.dataset.v;
  });
}
wireSeg("seg-cat","cat"); wireSeg("seg-num","num"); wireSeg("seg-order","order");

/* ============================================================
   開始
   ============================================================ */
function buildSession(idsOverride){
  let ids;
  if(idsOverride){
    ids = idsOverride.slice();
  } else {
    ids = QUESTIONS.map((q,i)=>i).filter(i => cfg.cat==="all" || QUESTIONS[i].cat===cfg.cat);
    if(cfg.order==="random"){
      for(let i=ids.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[ids[i],ids[j]]=[ids[j],ids[i]];}
    } else if(cfg.order==="weak"){
      // 苦手優先：誤答率が高い / 未回答を前へ
      ids.sort((x,y)=>weakScore(y)-weakScore(x));
    }
    if(cfg.num!=="all"){ ids = ids.slice(0, Math.min(parseInt(cfg.num,10), ids.length)); }
  }
  sessionIds = ids.slice();
  queue = ids.slice();
  streak = 0; answeredCount = 0; sessionCorrect = 0;
}
function weakScore(i){
  const s = stats[i]; if(!s) return 0.5; // 未回答は中程度に前へ
  const total = s.correct + s.wrong;
  if(total===0) return 0.5;
  return s.wrong/total + (s.correct===0 ? 0.2 : 0);
}

function startSession(idsOverride){
  buildSession(idsOverride);
  if(queue.length===0){ return; }
  startEl.classList.add("hidden");
  quizEl.classList.remove("hidden");
  showNext();
}

$("go").addEventListener("click", ()=>startSession());

/* ============================================================
   出題
   ============================================================ */
function updateRing(){
  const total = answeredCount;
  const acc = total ? Math.round(sessionCorrect/total*100) : 0;
  const ratio = total ? sessionCorrect/total : 0;
  const C = 157;
  $("ring-fg").style.strokeDashoffset = String(C*(1-ratio));
  $("lap-n").textContent = total ? acc : "–";
  $("remain").textContent = "出題 " + total + " 問 ・ 正解 " + sessionCorrect + " 問";
}

function showNext(){
  locked = false;
  // ランダムで次の問題を選ぶ（直前と同じ問題は避ける）
  const pool = sessionIds;
  let nextId = pool[0];
  if(pool.length > 1){
    do { nextId = pool[Math.floor(Math.random()*pool.length)]; } while(nextId === current);
  }
  current = nextId;
  const q = QUESTIONS[current];

  $("q-cat").textContent = CAT_LABEL[q.cat];
  $("q-sub").textContent = q.sub;
  $("streak").textContent = streak>=2 ? ("🔥 " + streak + "連続正解") : "";
  $("qnum").textContent = "Q. " + String(answeredCount+1).padStart(2,"0");
  $("qtext").innerHTML = escapeHTML(q.q);

  const cont = $("choices"); cont.innerHTML = "";
  q.c.forEach((text, idx)=>{
    const b = document.createElement("button");
    b.className = "choice"; b.type="button"; b.dataset.idx = idx;
    b.innerHTML = '<span class="key">'+KEYS[idx]+'</span><span class="ctext">'+escapeHTML(text)+'</span>';
    b.addEventListener("click", ()=>answer(idx));
    cont.appendChild(b);
  });

  $("fb").className = "fb"; $("nextrow").className = "nextrow";
  updateRing();
  quizEl.scrollIntoView({behavior:"smooth", block:"start"});
}

function answer(idx){
  if(locked) return;
  locked = true;
  const q = QUESTIONS[current];
  const ok = idx===q.a;
  answeredCount++;
  recordResult(current, ok);

  // 選択肢の色付け
  [...$("choices").children].forEach(b=>{
    const i = +b.dataset.idx; b.disabled = true;
    if(i===q.a) b.classList.add("correct");
    else if(i===idx) b.classList.add("wrong");
    else b.classList.add("dim");
  });

  // フィードバック
  const fb=$("fb");
  $("verdict").innerHTML = ok ? "◎ 正解" : "× 不正解";
  $("exp").innerHTML = (ok ? "" : '<span class="ans">正解：'+KEYS[q.a]+'　'+escapeHTML(q.c[q.a])+'</span><br>') + escapeHTML(q.exp);

  // ループ処理：正誤に関係なく次はランダム。問題は取り除かない。
  if(ok){
    streak++; sessionCorrect++;
    $("loopnote").textContent = "";
    fb.className = "fb show ok";
  } else {
    streak = 0;
    $("loopnote").textContent = "";
    fb.className = "fb show ng";
  }
  $("streak").textContent = streak>=2 ? ("🔥 " + streak + "連続正解") : "";
  $("nextrow").className = "nextrow show";
  updateRing();
  $("next").focus();
}

$("next").addEventListener("click", showNext);

$("quit").addEventListener("click", ()=>{
  quizEl.classList.add("hidden");
  startEl.classList.remove("hidden");
  refreshOverall();
  startEl.scrollIntoView({behavior:"smooth", block:"start"});
});

/* ============================================================
   通算成績
   ============================================================ */
function refreshOverall(){
  let c=0,w=0,mastered=0;
  Object.keys(stats).forEach(id=>{
    const s=stats[id]; c+=s.correct; w+=s.wrong;
    if(s.correct>0 && s.correct >= s.wrong) mastered++;
  });
  const total = c+w;
  $("ov-acc").textContent = total ? Math.round(c/total*100)+"%" : "–";
  $("ov-mastered").textContent = mastered + "/" + QUESTIONS.length;
  $("ov-answered").textContent = total;
}
let resetArmed = false, resetTimer = null;
$("resetstats").addEventListener("click", async ()=>{
  const btn = $("resetstats");
  if(!resetArmed){
    resetArmed = true;
    btn.textContent = "本当に消去しますか？ もう一度タップ";
    btn.style.color = "var(--wrong)";
    resetTimer = setTimeout(()=>{
      resetArmed = false;
      btn.textContent = "学習記録をリセット";
      btn.style.color = "";
    }, 4000);
    return;
  }
  clearTimeout(resetTimer);
  resetArmed = false;
  stats = {}; await saveStats(); refreshOverall();
  btn.textContent = "記録を消去しました";
  btn.style.color = "";
  setTimeout(()=>{ btn.textContent = "学習記録をリセット"; }, 1800);
});

/* ============================================================
   キーボード操作
   ============================================================ */
document.addEventListener("keydown", e=>{
  if(quizEl.classList.contains("hidden")) return;
  if(!locked){
    const map = {"1":0,"2":1,"3":2,"4":3};
    if(e.key in map && QUESTIONS[current] && map[e.key] < QUESTIONS[current].c.length){
      answer(map[e.key]); e.preventDefault();
    }
  } else if(e.key==="Enter"){
    showNext(); e.preventDefault();
  }
});

/* ============================================================
   ユーティリティ
   ============================================================ */
function escapeHTML(s){
  return String(s).replace(/[&<>"]/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[m]));
}

/* ============================================================
   init
   ============================================================ */
(async function init(){
  await loadStats();
  refreshOverall();
})();
</script>

  });
